name: Deploy JHipster App to EC2

# Exécute le pipeline à chaque push sur la branche 'main'
on:
  push:
    branches:
      - development

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install npm depedencies
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: '17'

      - name: Build with Maven
        run: ./mvnw clean package -Pprod -DskipTests

      - name: Copy jar to EC2
        run: |
          chmod 400 ./ecom-ssh-key.pem
          scp -i ./ecom-ssh-key.pem -o StrictHostKeyChecking=no ./target/jhipsterlearn-0.0.1-SNAPSHOT.jar ec2-user@13.60.71.207:/home/ec2-user/
