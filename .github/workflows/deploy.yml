name: Deploy JHipster App to EC2

# Exécute le pipeline à chaque push sur la branche 'main'
on:
  push:
    branches:
      - development

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install npm depedencies
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: '17'

      - name: Build with Maven
        run: ./mvnw clean package -Pprod -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ecom-app
          path: ./target/jhipsterlearn-0.0.1-SNAPSHOT.jar

      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: ecom-app
          path: ./

      - name: Copy jar to EC2
        env:
          PRIVATE_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$PRIVATE_SSH_KEY" > github-key.pem
          chmod 400 github-key.pem
          scp -i github-key.pem -o StrictHostKeyChecking=no ./jhipsterlearn-0.0.1-SNAPSHOT.jar ec2-user@ec2-13-60-71-207.eu-north-1.compute.amazonaws.com:/home/ec2-user/jhipsterlearn-0.0.1-SNAPSHOT.jar
